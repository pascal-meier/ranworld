name: Deploy Dev Preview

on:
  push:
    branches:
      - dev   # nur wenn du auf dev pushst

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # hier könntest du dein Projekt noch bauen, falls nötig
      # - name: Build
      #   run: npm install && npm run build

      - name: Deploy to Pages (dev folder)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: public      # das ist dein GitHub Pages Branch
          folder: .           # dein dev-Branch-Inhalt
          target-folder: dev  # wird in /dev/ abgelegt
